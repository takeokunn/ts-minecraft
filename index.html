<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TypeScript implementation of Minecraft using Three.js and Effect-TS" />
    <link rel="icon" href="data:," />
    <title>ts-minecraft</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      #game-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="multiplayer-root"></div>
    <canvas id="game-canvas"></canvas>
    <div id="fps-counter" style="position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; font-family: monospace; font-size: 14px; pointer-events: none; z-index: 10;">
      FPS: <span id="fps-value">0</span>
    </div>
    <div id="health-display" style="position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #f66; padding: 5px 12px; font-family: monospace; font-size: 16px; pointer-events: none; z-index: 10;">
      &#9829; <span id="health-value">20</span>/<span id="health-max">20</span>
    </div>
    <div id="hunger-display" style="position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #fb3; padding: 5px 12px; font-family: monospace; font-size: 16px; pointer-events: none; z-index: 10;">
      &#127831; <span id="hunger-value">20</span>/<span id="hunger-max">20</span>
    </div>
    <div id="armor-display" style="position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #cdd6e0; padding: 5px 12px; font-family: monospace; font-size: 16px; pointer-events: none; z-index: 10;">
      &#128737; <span id="armor-value">0</span>
    </div>
    <!-- Air/oxygen (FR-2): hidden until the head is underwater; physics-stage toggles display + bubble count. -->
    <div id="air-display" style="display: none; position: fixed; bottom: 170px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #7ec8ff; padding: 5px 12px; font-family: monospace; font-size: 16px; pointer-events: none; z-index: 10;"></div>
    <!-- Block break progress: hidden until left-click held on a block; interaction-stage updates value/max each frame. -->
    <progress id="break-progress" value="0" max="100" style="display: none; position: fixed; top: calc(50% + 20px); left: 50%; transform: translateX(-50%); width: 140px; height: 8px; pointer-events: none; z-index: 10; accent-color: #e8c040;"></progress>
    <div id="xp-display" style="position: fixed; bottom: 55px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #7dff4f; padding: 4px 12px; font-family: monospace; font-size: 14px; pointer-events: none; z-index: 10;">
      &#11088; Lv <span id="xp-level">0</span> &nbsp; <span id="xp-bar">0</span>/<span id="xp-bar-max">7</span> XP
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
